language: node_js
node_js:
- '10'
cache:
  yarn: true
  directories:
  - node_modules
install:
- yarn
- yarn build-css
- yarn global add codecov
script:
- yarn test --coverage
- codecov
deploy:
  provider: heroku
  api_key:
    secure: 
  app:
    develop: rv-management-dev
    master: rv-management
